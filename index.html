<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>小数学家，九九乘法表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        h1 {
            color: white;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1 .icon {
            font-size: 2.2rem;
        }

        .mode-label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            margin-bottom: 25px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        .multiplication-table {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }

        .row {
            display: flex;
            gap: 8px;
        }

        .cell {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        .cell:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .col-1, .col-2, .col-5, .col-9 {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
        }

        .col-3, .col-4, .col-6 {
            background: linear-gradient(135deg, #f39c12 0%, #f1c40f 100%);
        }

        .col-7, .col-8 {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .popup {
            position: absolute;
            bottom: calc(100% + 12px);
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            white-space: nowrap;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 100;
        }

        .popup::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px;
            border-style: solid;
            border-color: #667eea transparent transparent transparent;
        }

        .cell:hover .popup {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        .switch-btn {
            margin-top: 30px;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            backdrop-filter: blur(10px);
            white-space: nowrap;
            display: inline-block;
        }

        .switch-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 700px) {
            body {
                padding: 20px 10px;
            }
            h1 {
                font-size: 1.4rem;
                gap: 8px;
            }
            h1 .icon {
                font-size: 1.5rem;
            }
            .mode-label {
                font-size: 0.85rem;
                padding: 6px 12px;
                margin-bottom: 15px;
            }
            .cell {
                width: 38px;
                height: 38px;
                font-size: 0.65rem;
            }
            .row {
                gap: 5px;
            }
            .multiplication-table {
                gap: 5px;
            }
            .popup {
                font-size: 0.85rem;
                padding: 7px 12px;
                bottom: calc(100% + 8px);
            }
            .switch-btn {
                margin-top: 20px;
                padding: 10px 24px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><span class="icon">🌟</span>小数学家，九九乘法表</h1>
    </div>
    <div class="mode-label" id="modeLabel">背诵模式：三角表格，完整显示结果</div>
    <div class="multiplication-table" id="multiplicationTable"></div>
    <button class="switch-btn" id="switchBtn">切换到练习模式</button>

    <script>
        const modeLabel = document.getElementById('modeLabel');
        const table = document.getElementById('multiplicationTable');
        const switchBtn = document.getElementById('switchBtn');
        let isReciteMode = true;

        function generateTable() {
            table.innerHTML = '';
            if (isReciteMode) {
                for (let i = 1; i <= 9; i++) {
                    const row = document.createElement('div');
                    row.className = 'row';
                    for (let j = 1; j <= i; j++) {
                        const cell = document.createElement('div');
                        cell.className = `cell col-${j}`;
                        cell.textContent = `${j}×${i}=${j * i}`;
                        row.appendChild(cell);
                    }
                    table.appendChild(row);
                }
            } else {
                for (let i = 1; i <= 9; i++) {
                    const row = document.createElement('div');
                    row.className = 'row';
                    for (let j = 1; j <= 9; j++) {
                        const cell = document.createElement('div');
                        cell.className = `cell col-${Math.min(j, i)}`;
                        cell.textContent = `${j}×${i}`;

                        const popup = document.createElement('div');
                        popup.className = 'popup';
                        popup.textContent = `${j}×${i}=${j * i}`;

                        cell.appendChild(popup);
                        row.appendChild(cell);
                    }
                    table.appendChild(row);
                }
            }
        }

        function toggleMode() {
            isReciteMode = !isReciteMode;
            if (isReciteMode) {
                modeLabel.textContent = '背诵模式：三角表格，完整显示结果';
                switchBtn.textContent = '切换到练习模式';
            } else {
                modeLabel.textContent = '练习模式：悬停查看答案，完整9×9表格';
                switchBtn.textContent = '切换到背诵模式';
            }
            generateTable();
        }

        switchBtn.addEventListener('click', toggleMode);
        generateTable();
    </script>
</body>
</html>
